AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  aadi-users-service

Parameters:
  UserPoolId:
    Type: String
    Description: Cognito User Pool ID for JWT auth
  UserPoolClientId:
    Type: String
    Description: Cognito User Pool Client ID

  UserAvatarsBucketName:
    Type: String
    Description: Name of the S3 Bucket for User Avatars
  CorsAllowOrigin:
    Type: String
    Description: Allowed CORS origin
    Default: "http://localhost:5173"
  CorsAllowOriginAdmin:
    Type: String
    Description: Allowed CORS origin for admin portal
    Default: "http://localhost:5174"

Globals:
  Function:
    Timeout: 15
    Runtime: python3.11
    Architectures:
      - arm64
  HttpApi:
    Auth:
      DefaultAuthorizer: CognitoJWT
      Authorizers:
        CognitoJWT:
          IdentitySource: "$request.header.Authorization"
          JwtConfiguration:
            issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}"
            audience:
              - !Ref UserPoolClientId
    CorsConfiguration:
      AllowOrigins:
        - !Ref CorsAllowOrigin
        - !Ref CorsAllowOriginAdmin
        - "http://localhost:5173"
        - "http://localhost:5174"
      AllowHeaders:
        - "Authorization"
        - "Content-Type"
      AllowMethods:
        - "GET"
        - "POST"
        - "PUT"
        - "OPTIONS"

Resources:
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH

  UserAvatarsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref UserAvatarsBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: false
        IgnorePublicAcls: true
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - HEAD
            AllowedOrigins:
              - "*"
            ExposedHeaders:
              - ETag
            MaxAge: 3000

  UserAvatarsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UserAvatarsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadAvatars
            Effect: Allow
            Principal: "*"
            Action:
              - s3:GetObject
            Resource: !Sub "${UserAvatarsBucket.Arn}/*"

  UsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          USER_POOL_ID: !Ref UserPoolId
          AVATARS_BUCKET_NAME: !Ref UserAvatarsBucketName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - S3CrudPolicy:
            BucketName: !Ref UserAvatarsBucketName
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminUpdateUserAttributes
              Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}"
      Events:
        GetProfile:
          Type: HttpApi
          Properties:
            Path: /v1/users/me
            Method: GET
        UpdateProfile:
          Type: HttpApi
          Properties:
            Path: /v1/users/me
            Method: PUT
        CreateAvatarUploadUrl:
          Type: HttpApi
          Properties:
            Path: /v1/users/me/avatar/upload-url
            Method: POST
        HealthCheck:
          Type: HttpApi
          Properties:
            Path: /v1/users/health
            Method: GET
            Auth:
              Authorizer: NONE

Outputs:
  UsersApi:
    Description: "API Gateway endpoint URL for Users Service"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"

  UsersTableName:
    Description: "Users DynamoDB Table Name"
    Value: !Ref UsersTable
