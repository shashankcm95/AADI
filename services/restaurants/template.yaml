AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  aadi-restaurants-service

Parameters:
  UserPoolId:
    Type: String
    Description: Cognito User Pool ID for JWT auth
  UserPoolClientId:
    Type: String
    Description: Cognito User Pool Client ID
  CorsAllowOrigin:
    Type: String
    Description: Allowed CORS origin (e.g. https://d1234.cloudfront.net). Use '*' only for local dev.
    Default: "http://localhost:5173"

Globals:
  Function:
    Timeout: 15
    Runtime: python3.11
    Architectures:
      - arm64
  HttpApi:
    Auth:
      DefaultAuthorizer: CognitoJWT
      Authorizers:
        CognitoJWT:
          IdentitySource: "$request.header.Authorization"
          JwtConfiguration:
            issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}"
            audience:
              - !Ref UserPoolClientId
    CorsConfiguration:
      AllowOrigins:
        - "https://d1f1m06nqs4ul2.cloudfront.net"
        - "https://d18dqw0gujya99.cloudfront.net"
        - "http://localhost:5173"
        - "http://localhost:5174"
      AllowHeaders:
        - "Authorization"
        - "Content-Type"
      AllowMethods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "OPTIONS"

Resources:
  RestaurantsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: restaurant_id
          AttributeType: S
        - AttributeName: is_active
          AttributeType: S
        - AttributeName: name
          AttributeType: S
        - AttributeName: cuisine
          AttributeType: S
        - AttributeName: price_tier
          AttributeType: N
      KeySchema:
        - AttributeName: restaurant_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: GSI_ActiveRestaurants
          KeySchema:
            - AttributeName: is_active
              KeyType: HASH
            - AttributeName: name
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI_Cuisine
          KeySchema:
            - AttributeName: cuisine
              KeyType: HASH
            - AttributeName: name
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI_PriceTier
          KeySchema:
            - AttributeName: price_tier
              KeyType: HASH
            - AttributeName: name
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  RestaurantConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: restaurant_id
          AttributeType: S
      KeySchema:
        - AttributeName: restaurant_id
          KeyType: HASH

  MenusTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: restaurant_id
          AttributeType: S
        - AttributeName: menu_version
          AttributeType: S
      KeySchema:
        - AttributeName: restaurant_id
          KeyType: HASH
        - AttributeName: menu_version
          KeyType: RANGE

  FavoritesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customer_id
          AttributeType: S
        - AttributeName: restaurant_id
          AttributeType: S
      KeySchema:
        - AttributeName: customer_id
          KeyType: HASH
        - AttributeName: restaurant_id
          KeyType: RANGE

  RestaurantImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - HEAD
            AllowedOrigins:
              - "*"
            ExposedHeaders:
              - ETag
            MaxAge: 3000

  RestaurantsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Environment:
        Variables:
          RESTAURANTS_TABLE: !Ref RestaurantsTable
          MENUS_TABLE: !Ref MenusTable
          RESTAURANT_CONFIG_TABLE: !Ref RestaurantConfigTable
          FAVORITES_TABLE: !Ref FavoritesTable
          RESTAURANT_IMAGES_BUCKET: !Ref RestaurantImagesBucket
          IMAGE_URL_TTL_SECONDS: 3600
          USER_POOL_ID: !Ref UserPoolId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminSetUserAttributes
                - cognito-idp:ListUsers
                - cognito-idp:AdminDeleteUser
              Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}"
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: !Sub "${RestaurantImagesBucket.Arn}/*"
        - DynamoDBCrudPolicy:
            TableName: !Ref RestaurantsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MenusTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RestaurantConfigTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FavoritesTable
      Events:
        ListRestaurants:
          Type: HttpApi
          Properties:
            Path: /v1/restaurants
            Method: GET
        CreateRestaurant:
          Type: HttpApi
          Properties:
            Path: /v1/restaurants
            Method: POST
        UpdateRestaurant:
          Type: HttpApi
          Properties:
            Path: /v1/restaurants/{restaurant_id}
            Method: PUT
        DeleteRestaurant:
          Type: HttpApi
          Properties:
            Path: /v1/restaurants/{restaurant_id}
            Method: DELETE
        GetMenu:
          Type: HttpApi
          Properties:
            Path: /v1/restaurants/{restaurant_id}/menu
            Method: GET
        UpdateMenu:
          Type: HttpApi
          Properties:
            Path: /v1/restaurants/{restaurant_id}/menu
            Method: POST
        GetConfig:
          Type: HttpApi
          Properties:
            Path: /v1/restaurants/{restaurant_id}/config
            Method: GET
        UpdateConfig:
          Type: HttpApi
          Properties:
            Path: /v1/restaurants/{restaurant_id}/config
            Method: PUT
        HealthCheck:
          Type: HttpApi
          Properties:
            Path: /v1/restaurants/health
            Method: GET
        ListFavorites:
          Type: HttpApi
          Properties:
            Path: /v1/favorites
            Method: GET
        PutFavorite:
          Type: HttpApi
          Properties:
            Path: /v1/favorites/{restaurant_id}
            Method: PUT
        DeleteFavorite:
          Type: HttpApi
          Properties:
            Path: /v1/favorites/{restaurant_id}
            Method: DELETE
        CreateRestaurantImageUploadUrl:
          Type: HttpApi
          Properties:
            Path: /v1/restaurants/{restaurant_id}/images/upload-url
            Method: POST

Outputs:
  RestaurantsApi:
    Description: "API Gateway endpoint URL for Restaurants Service"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"

  RestaurantsTableName:
    Description: "Restaurants DynamoDB Table Name"
    Value: !Ref RestaurantsTable

  RestaurantConfigTableName:
    Description: "Restaurant Config DynamoDB Table Name"
    Value: !Ref RestaurantConfigTable

  FavoritesTableName:
    Description: "Favorites DynamoDB Table Name"
    Value: !Ref FavoritesTable

  RestaurantImagesBucketName:
    Description: "S3 bucket for restaurant media uploads"
    Value: !Ref RestaurantImagesBucket
