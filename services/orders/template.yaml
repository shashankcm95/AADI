AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  aadi-orders-service

Parameters:
  UserPoolId:
    Type: String
    Description: Cognito User Pool ID for JWT auth
  UserPoolClientId:
    Type: String
    Description: Cognito User Pool Client ID
  RestaurantConfigTableName:
    Type: String
    Description: Name of the RestaurantConfigTable from the restaurants stack (cross-service read)
    Default: ""
  CorsAllowOrigin:
    Type: String
    Description: Allowed CORS origin (e.g. https://d1234.cloudfront.net). Use '*' only for local dev.
    Default: "http://localhost:5173"
  CorsAllowOriginAdmin:
    Type: String
    Description: Allowed CORS origin for admin portal
    Default: "http://localhost:5174"
  LocationTrackerName:
    Type: String
    Description: Amazon Location tracker name for customer device positions
    Default: ""
  LocationGeofenceCollectionName:
    Type: String
    Description: Amazon Location geofence collection used for arrival events
    Default: ""
  LocationGeofenceCutoverEnabled:
    Type: String
    Description: If true, geofence events can transition orders; false keeps shadow mode only
    Default: "false"
  LocationGeofenceForceShadow:
    Type: String
    Description: Emergency rollback switch; if true geofence consumer stays in shadow mode even when cutover is enabled
    Default: "false"
  SharedLayerArn:
    Type: String
    Description: ARN of the shared Lambda Layer
    Default: ""

Globals:
  Function:
    Timeout: 15
    MemorySize: 256
    Runtime: python3.11
    Architectures:
      - arm64
    Layers:
      - !Ref SharedLayerArn
  HttpApi:
    Auth:
      DefaultAuthorizer: CognitoJWT
      Authorizers:
        CognitoJWT:
          IdentitySource: "$request.header.Authorization"
          JwtConfiguration:
            issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}"
            audience:
              - !Ref UserPoolClientId
    CorsConfiguration:
      AllowOrigins:
        - !Ref CorsAllowOrigin
        - !Ref CorsAllowOriginAdmin
        - "http://localhost:5173"
        - "http://localhost:5174"
      AllowHeaders:
        - "Authorization"
        - "Content-Type"
        - "Idempotency-Key"
      AllowMethods:
        - "GET"
        - "POST"
        - "OPTIONS"

Conditions:
  HasLocationTrackerName: !Not [!Equals [!Ref LocationTrackerName, ""]]
  HasLocationGeofenceCollectionName: !Not [!Equals [!Ref LocationGeofenceCollectionName, ""]]

Resources:
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: order_id
          AttributeType: S
        - AttributeName: restaurant_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: customer_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: N
        - AttributeName: expires_at
          AttributeType: N
      KeySchema:
        - AttributeName: order_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: GSI_RestaurantStatus
          KeySchema:
            - AttributeName: restaurant_id
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI_CustomerOrders
          KeySchema:
            - AttributeName: customer_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI_StatusExpiry
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: expires_at
              KeyType: RANGE
          Projection:
            ProjectionType: KEYS_ONLY
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  CapacityTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: restaurant_id
          AttributeType: S
        - AttributeName: window_start
          AttributeType: N
      KeySchema:
        - AttributeName: restaurant_id
          KeyType: HASH
        - AttributeName: window_start
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  IdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: idempotency_key
          AttributeType: S
      KeySchema:
        - AttributeName: idempotency_key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  GeofenceEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: event_id
          AttributeType: S
      KeySchema:
        - AttributeName: event_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  OrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Environment:
        Variables:
          ORDERS_TABLE: !Ref OrdersTable
          CAPACITY_TABLE: !Ref CapacityTable
          IDEMPOTENCY_TABLE: !Ref IdempotencyTable
          RESTAURANT_CONFIG_TABLE: !Ref RestaurantConfigTableName
          LOCATION_TRACKER_NAME: !Ref LocationTrackerName
          LOCATION_GEOFENCE_COLLECTION_NAME: !Ref LocationGeofenceCollectionName
          CORS_ALLOW_ORIGIN: !Ref CorsAllowOrigin
          CORS_ALLOW_ORIGIN_ADMIN: !Ref CorsAllowOriginAdmin
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CapacityTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - DynamoDBReadPolicy:
            TableName: !Ref RestaurantConfigTableName
        - Statement:
            - Effect: Allow
              Action:
                - geo:BatchUpdateDevicePosition
              Resource: !If
                - HasLocationTrackerName
                - !Sub "arn:aws:geo:${AWS::Region}:${AWS::AccountId}:tracker/${LocationTrackerName}"
                - !Sub "arn:aws:geo:${AWS::Region}:${AWS::AccountId}:tracker/no-tracker-assigned"
      Events:
        CreateOrder:
          Type: HttpApi
          Properties:
            Path: /v1/orders
            Method: POST
        IngestLocation:
          Type: HttpApi
          Properties:
            Path: /v1/orders/{order_id}/location
            Method: POST
        UpdateVicinity:
          Type: HttpApi
          Properties:
            Path: /v1/orders/{order_id}/vicinity
            Method: POST
        ListRestaurantOrders:
          Type: HttpApi
          Properties:
            Path: /v1/restaurants/{restaurant_id}/orders
            Method: GET
        RestaurantAck:
          Type: HttpApi
          Properties:
            Path: /v1/restaurants/{restaurant_id}/orders/{order_id}/ack
            Method: POST
        GetOrder:
          Type: HttpApi
          Properties:
            Path: /v1/orders/{order_id}
            Method: GET
        GetLeaveAdvisory:
          Type: HttpApi
          Properties:
            Path: /v1/orders/{order_id}/advisory
            Method: GET
        ListCustomerOrders:
          Type: HttpApi
          Properties:
            Path: /v1/orders
            Method: GET
        CancelOrder:
          Type: HttpApi
          Properties:
            Path: /v1/orders/{order_id}/cancel
            Method: POST
        RestaurantSetStatus:
          Type: HttpApi
          Properties:
            Path: /v1/restaurants/{restaurant_id}/orders/{order_id}/status
            Method: POST

  GeofenceEventsFunction:
    Type: AWS::Serverless::Function
    Condition: HasLocationGeofenceCollectionName
    Properties:
      CodeUri: src/
      Handler: geofence_events.lambda_handler
      Environment:
        Variables:
          ORDERS_TABLE: !Ref OrdersTable
          CAPACITY_TABLE: !Ref CapacityTable
          RESTAURANT_CONFIG_TABLE: !Ref RestaurantConfigTableName
          GEOFENCE_EVENTS_TABLE: !Ref GeofenceEventsTable
          LOCATION_GEOFENCE_COLLECTION_NAME: !Ref LocationGeofenceCollectionName
          LOCATION_GEOFENCE_CUTOVER_ENABLED: !Ref LocationGeofenceCutoverEnabled
          LOCATION_GEOFENCE_FORCE_SHADOW: !Ref LocationGeofenceForceShadow
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CapacityTable
        - DynamoDBReadPolicy:
            TableName: !Ref RestaurantConfigTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref GeofenceEventsTable
      Events:
        ProcessLocationGeofenceEnter:
          Type: CloudWatchEvent
          Properties:
            Pattern:
              source:
                - aws.geo
              detail-type:
                - Location Geofence Event
              detail:
                EventType:
                  - ENTER
                GeofenceCollection:
                  - !Ref LocationGeofenceCollectionName

  ExpireOrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-expire-orders"
      CodeUri: src/
      Handler: expire_orders.lambda_handler
      Environment:
        Variables:
          ORDERS_TABLE: !Ref OrdersTable
          EXPIRY_GSI_NAME: GSI_StatusExpiry
          EXPIRY_SCAN_FALLBACK_ENABLED: "true"
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:Scan
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt OrdersTable.Arn
                - !Sub "${OrdersTable.Arn}/index/*"
      Events:
        ScheduledExpiry:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Description: Expire abandoned PENDING/WAITING orders
            Enabled: true

Outputs:
  OrdersApi:
    Description: "API Gateway endpoint URL for Orders Service"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"

  OrdersTableName:
    Description: "Orders DynamoDB table name"
    Value: !Ref OrdersTable

  GeofenceEventsTableName:
    Description: "DynamoDB table storing dedupe records for geofence events"
    Value: !Ref GeofenceEventsTable
