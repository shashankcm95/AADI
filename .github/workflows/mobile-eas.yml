name: Mobile EAS

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        type: choice
        default: preview
        options:
          - development
          - preview
          - production
      wait_for_build:
        description: "Wait for EAS build completion"
        required: true
        type: boolean
        default: false
  pull_request:
    branches: [ "main" ]
    paths:
      - "packages/mobile-ios/**"
      - ".github/workflows/mobile-eas.yml"
  push:
    branches: [ "main" ]
    paths:
      - "packages/mobile-ios/**"
      - ".github/workflows/mobile-eas.yml"

permissions:
  contents: read

jobs:
  validate-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Mobile Dependencies
        run: npm ci --workspace=packages/mobile-ios

      - name: Validate Expo Config
        run: cd packages/mobile-ios && npx expo config --type public

      - name: Run Mobile Unit Tests
        run: >
          npm test --workspace=packages/mobile-ios -- --watch=false
          --runTestsByPath src/services/__tests__/api.test.ts src/services/__tests__/location.test.ts

      - name: Run Mobile Typecheck
        run: npx tsc --project packages/mobile-ios/tsconfig.ci.json --noEmit

  build-ios:
    if: github.event_name == 'workflow_dispatch'
    needs: validate-mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Mobile Dependencies
        run: npm ci --workspace=packages/mobile-ios

      - name: Ensure EXPO_TOKEN exists
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Missing EXPO_TOKEN secret."
            exit 1
          fi

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Trigger iOS EAS Build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd packages/mobile-ios
          if [ "${{ inputs.wait_for_build }}" = "true" ]; then
            eas build --platform ios --profile "${{ inputs.profile }}" --non-interactive
          else
            eas build --platform ios --profile "${{ inputs.profile }}" --non-interactive --no-wait
          fi
