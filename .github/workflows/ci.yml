name: Arrive CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install SAM CLI
        uses: aws-actions/setup-sam@v2
      
      - name: Validate SAM Templates
        run: |
          sam validate --template infrastructure/template.yaml --region us-east-1
          sam validate --template services/orders/template.yaml --region us-east-1
          sam validate --template services/restaurants/template.yaml --region us-east-1
          sam validate --template services/pos-integration/template.yaml --region us-east-1

      - name: Install Test Dependencies
        run: |
          pip install -r infrastructure/requirements-dev.txt
          pip install -r services/orders/requirements.txt
          pip install -r services/restaurants/requirements.txt
      
      - name: Run Orders Engine Tests
        run: |
          cd services/orders
          python -m pytest tests/ -v

      - name: Run Restaurants Tests
        run: |
          cd services/restaurants
          python -m pytest tests/ -v

      - name: Run Users Service Tests
        run: |
          cd services/users
          pip install -r requirements.txt 2>/dev/null || true
          python -m pytest tests/ -v

      - name: Run POS Integration Tests
        run: |
          cd services/pos-integration
          pip install -r requirements.txt 2>/dev/null || true
          python -m pytest tests/ -v

      - name: Run Isolated Python Suite Gate
        run: python -m pytest tests/test_python_suites.py -q

      - name: Run Linter (Ruff)
        run: ruff check services/orders/src services/restaurants/src services/users/src services/pos-integration/src services/shared/python/shared

      - name: Scan for Secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline
          detect-secrets audit --report --baseline .secrets.baseline

  frontend-check:
    if: false  # Disabled until frontend CI dependencies are configured
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Build & Lint
        run: npx turbo run lint build --filter=client --filter=admin-portal

  mobile-check:
    if: false  # Disabled until mobile CI dependencies are configured
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Mobile Unit Tests
        env:
          CI: "true"
        run: npm run test --workspace=packages/mobile-ios -- --runInBand
