AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  arrive-api

  Sample SAM Template for arrive-api

Parameters:
  GoogleClientId:
    Type: String
    Description: Google OAuth 2.0 Client ID
    # Default: "PLACEHOLDER_CLIENT_ID"
  GoogleClientSecret:
    Type: String
    Description: Google OAuth 2.0 Client Secret
    NoEcho: true
  LocationGeofenceCutoverEnabled:
    Type: String
    Description: If true, AWS geofence ENTER events can authoritatively transition pending/waiting orders
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  LocationGeofenceForceShadow:
    Type: String
    Description: Emergency rollback switch for geofence cutover; true keeps consumer in shadow mode
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  DeployPosIntegration:
    Type: String
    Description: Deploy POS integration nested stack (kept optional while rollout/testing is staged)
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

Globals:
  Function:
    Timeout: 15
    MemorySize: 256

    Tracing: Active
    LoggingConfig:
      LogFormat: JSON
      ApplicationLogLevel: INFO
      SystemLogLevel: INFO
  Api:
    TracingEnabled: true
    # Security for Stage
    Auth:
      DefaultAuthorizer: CognitoJWT
      Authorizers:
        CognitoJWT:
          IdentitySource: "$request.header.Authorization"
          JwtConfiguration:
            issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
            audience:
              - !Ref UserPoolClient

Conditions:
  DeployPosIntegrationEnabled: !Equals [!Ref DeployPosIntegration, "true"]

Resources:
  # -------------------------------------------------------------------------
  # Auth Resources (Cognito + Google)
  # -------------------------------------------------------------------------
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-user-pool"
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: role
          AttributeDataType: String
          Mutable: true
          Required: false
        - Name: restaurant_id
          AttributeDataType: String
          Mutable: true
          Required: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      # NOTE: PostConfirmation trigger cannot be declared here without a circular
      # dependency (UserPool → PostConfirmationFunction → UsersService → UserPool).
      # The trigger is attached post-deploy via a CloudFormation CustomResource below.
      # Do NOT add LambdaConfig here.

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${AWS::StackName}-client"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      SupportedIdentityProviders:
        - COGNITO
      AllowedOAuthFlows:
        - code
        - implicit
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
      CallbackURLs:
        - "http://localhost:3000/callback" 
        - "http://localhost:5173/"
        - "http://localhost:5174/"
        - !Sub "https://${CustomerWebDistribution.DomainName}/"
        - !Sub "https://${AdminPortalDistribution.DomainName}/"
      LogoutURLs:
        - "http://localhost:3000/logout"
        - "http://localhost:5173/"
        - "http://localhost:5174/"
        - !Sub "https://${CustomerWebDistribution.DomainName}/"
        - !Sub "https://${AdminPortalDistribution.DomainName}/"

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "${AWS::StackName}-auth-${AWS::AccountId}"
      UserPoolId: !Ref UserPool

  PostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: post_confirmation.lambda_handler
      Runtime: python3.11
      Architectures:
        - arm64
      Environment:
        Variables:
          USERS_TABLE: !GetAtt UsersService.Outputs.UsersTableName
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminUpdateUserAttributes
              Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*"
        - DynamoDBCrudPolicy:
            TableName: !GetAtt UsersService.Outputs.UsersTableName

  PostConfirmationInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PostConfirmationFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  # Attaches the PostConfirmation trigger to the UserPool via a CustomResource to
  # avoid a circular dependency (UserPool → PostConfirmationFunction → UsersService → UserPool).
  AttachPostConfirmationTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      InlineCode: |
        import boto3, cfnresponse
        def handler(event, context):
            cognito = boto3.client('cognito-idp')
            props = event['ResourceProperties']
            try:
                if event['RequestType'] in ('Create', 'Update'):
                    cognito.update_user_pool(
                        UserPoolId=props['UserPoolId'],
                        LambdaConfig={'PostConfirmation': props['LambdaArn']}
                    )
                elif event['RequestType'] == 'Delete':
                    cognito.update_user_pool(
                        UserPoolId=props['UserPoolId'],
                        LambdaConfig={}
                    )
                cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
            except Exception as e:
                cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})
      Handler: index.handler
      Runtime: python3.11
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:UpdateUserPool
                - cognito-idp:DescribeUserPool
              Resource: !GetAtt UserPool.Arn

  AttachPostConfirmationTrigger:
    Type: AWS::CloudFormation::CustomResource
    DependsOn:
      - PostConfirmationInvokePermission
      - UsersService
    Properties:
      ServiceToken: !GetAtt AttachPostConfirmationTriggerFunction.Arn
      UserPoolId: !Ref UserPool
      LambdaArn: !GetAtt PostConfirmationFunction.Arn

  # -------------------------------------------------------------------------
  # Amazon Location (Geofence event pipeline)
  # -------------------------------------------------------------------------
  LocationTracker:
    Type: AWS::Location::Tracker
    Properties:
      TrackerName: !Sub "${AWS::StackName}-arrival-tracker"
      PositionFiltering: AccuracyBased
      EventBridgeEnabled: true

  LocationGeofenceCollection:
    Type: AWS::Location::GeofenceCollection
    Properties:
      CollectionName: !Sub "${AWS::StackName}-arrival-geofences"

  LocationTrackerConsumer:
    Type: AWS::Location::TrackerConsumer
    Properties:
      TrackerName: !Ref LocationTracker
      ConsumerArn: !GetAtt LocationGeofenceCollection.Arn

  # -------------------------------------------------------------------------
  # Shared Lambda Layer
  # -------------------------------------------------------------------------
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "${AWS::StackName}-shared"
      Description: Cross-cutting utilities (CORS, auth, serialization, logger)
      ContentUri: ../services/shared
      CompatibleRuntimes:
        - python3.11
      CompatibleArchitectures:
        - arm64
      RetentionPolicy: Retain

  # -------------------------------------------------------------------------
  # Nested Stacks (Microservices)
  # -------------------------------------------------------------------------

  UsersService:
    Type: AWS::Serverless::Application
    Properties:
      Location: ../services/users/template.yaml
      Parameters:
        UserPoolId: !Ref UserPool
        UserPoolClientId: !Ref UserPoolClient

        UserAvatarsBucketName: !Sub "${AWS::StackName}-user-avatars-${AWS::AccountId}"
        CorsAllowOrigin: !Sub "https://${CustomerWebDistribution.DomainName}"
        CorsAllowOriginAdmin: !Sub "https://${AdminPortalDistribution.DomainName}"
        SharedLayerArn: !Ref SharedLayer

  RestaurantsService:
    Type: AWS::Serverless::Application
    Properties:
      Location: ../services/restaurants/template.yaml
      Parameters:
        UserPoolId: !Ref UserPool
        UserPoolClientId: !Ref UserPoolClient
        CorsAllowOrigin: !Sub "https://${CustomerWebDistribution.DomainName}"
        CorsAllowOriginAdmin: !Sub "https://${AdminPortalDistribution.DomainName}"
        LocationGeofenceCollectionName: !Ref LocationGeofenceCollection
        SharedLayerArn: !Ref SharedLayer

  OrdersService:
    Type: AWS::Serverless::Application
    Properties:
      Location: ../services/orders/template.yaml
      Parameters:
        UserPoolId: !Ref UserPool
        UserPoolClientId: !Ref UserPoolClient
        RestaurantConfigTableName: !GetAtt RestaurantsService.Outputs.RestaurantConfigTableName
        CorsAllowOrigin: !Sub "https://${CustomerWebDistribution.DomainName}"
        CorsAllowOriginAdmin: !Sub "https://${AdminPortalDistribution.DomainName}"
        LocationTrackerName: !Ref LocationTracker
        LocationGeofenceCollectionName: !Ref LocationGeofenceCollection
        LocationGeofenceCutoverEnabled: !Ref LocationGeofenceCutoverEnabled
        LocationGeofenceForceShadow: !Ref LocationGeofenceForceShadow
        SharedLayerArn: !Ref SharedLayer

  PosIntegrationService:
    Type: AWS::Serverless::Application
    Condition: DeployPosIntegrationEnabled
    Properties:
      Location: ../services/pos-integration/template.yaml
      Parameters:
        OrdersTableName: !GetAtt OrdersService.Outputs.OrdersTableName
        MenusTableName: !GetAtt RestaurantsService.Outputs.MenusTableName

  # -------------------------------------------------------------------------
  # Frontend Hosting (S3)
  # -------------------------------------------------------------------------
  CustomerWebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-customer-web-${AWS::AccountId}"
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CustomerWebCloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub "OAI for ${AWS::StackName}-customer-web"

  CustomerWebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CustomerWebBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudFrontReadAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::cloudfront:user/CloudFront Origin Access Identity ${CustomerWebCloudFrontOAI}"
            Action: "s3:GetObject"
            Resource: !Sub "${CustomerWebBucket.Arn}/*"

  AdminPortalBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-admin-portal-${AWS::AccountId}"
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AdminPortalCloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub "OAI for ${AWS::StackName}-admin-portal"

  AdminPortalBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AdminPortalBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudFrontReadAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::cloudfront:user/CloudFront Origin Access Identity ${AdminPortalCloudFrontOAI}"
            Action: "s3:GetObject"
            Resource: !Sub "${AdminPortalBucket.Arn}/*"

  CustomerWebDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: CustomerWebOrigin
            DomainName: !GetAtt CustomerWebBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${CustomerWebCloudFrontOAI}"
        DefaultCacheBehavior:
          TargetOriginId: CustomerWebOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none

  AdminPortalDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: AdminPortalOrigin
            DomainName: !GetAtt AdminPortalBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${AdminPortalCloudFrontOAI}"
        DefaultCacheBehavior:
          TargetOriginId: AdminPortalOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none

Outputs:
  AuthUrl:
    Description: "Cognito Hosted UI"
    Value: !Sub "https://${UserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/login?client_id=${UserPoolClient}&response_type=code&scope=email+openid+profile&redirect_uri=https://${CustomerWebDistribution.DomainName}/"

  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref UserPool

  UserPoolClientId:
    Description: "Cognito User Pool Client ID"
    Value: !Ref UserPoolClient

  CustomerWebBucketName:
    Description: "S3 Bucket for Customer Web"
    Value: !Ref CustomerWebBucket

  AdminPortalBucketName:
    Description: "S3 Bucket for Admin Portal"
    Value: !Ref AdminPortalBucket

  CustomerWebURL:
    Description: "CloudFront URL for Customer Web"
    Value: !Sub "https://${CustomerWebDistribution.DomainName}"

  CustomerWebDistributionId:
    Description: "CloudFront Distribution ID for Customer Web"
    Value: !Ref CustomerWebDistribution

  AdminPortalURL:
    Description: "CloudFront URL for Admin Portal"
    Value: !Sub "https://${AdminPortalDistribution.DomainName}"

  AdminPortalDistributionId:
    Description: "CloudFront Distribution ID for Admin Portal"
    Value: !Ref AdminPortalDistribution

  UsersApiUrl:
    Description: "API Endpoint for Users Service"
    Value: !GetAtt UsersService.Outputs.UsersApi

  RestaurantsApiUrl:
    Description: "API Endpoint for Restaurants Service"
    Value: !GetAtt RestaurantsService.Outputs.RestaurantsApi

  OrdersApiUrl:
    Description: "API Endpoint for Orders Service"
    Value: !GetAtt OrdersService.Outputs.OrdersApi

  PosIntegrationApiUrl:
    Condition: DeployPosIntegrationEnabled
    Description: "API Endpoint for POS Integration Service"
    Value: !GetAtt PosIntegrationService.Outputs.PosIntegrationApi

  LocationTrackerName:
    Description: "Amazon Location tracker name used for customer device positions"
    Value: !Ref LocationTracker

  LocationTrackerArn:
    Description: "Amazon Location tracker ARN"
    Value: !GetAtt LocationTracker.Arn

  LocationGeofenceCollectionName:
    Description: "Amazon Location geofence collection name"
    Value: !Ref LocationGeofenceCollection

  LocationGeofenceCollectionArn:
    Description: "Amazon Location geofence collection ARN"
    Value: !GetAtt LocationGeofenceCollection.Arn
