AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  arrive-api

  Sample SAM Template for arrive-api

Parameters:
  GoogleClientId:
    Type: String
    Description: Google OAuth 2.0 Client ID
    # Default: "PLACEHOLDER_CLIENT_ID"
  GoogleClientSecret:
    Type: String
    Description: Google OAuth 2.0 Client Secret
    Default: "PLACEHOLDER_CLIENT_SECRET"
    NoEcho: true

Globals:
  Function:
    Timeout: 15

    Tracing: Active
    LoggingConfig:
      LogFormat: JSON
      ApplicationLogLevel: INFO
      SystemLogLevel: INFO
  Api:
    TracingEnabled: true
    # Security for Stage
    Auth:
      DefaultAuthorizer: CognitoJWT
      Authorizers:
        CognitoJWT:
          IdentitySource: "$request.header.Authorization"
          JwtConfiguration:
            issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
            audience:
              - !Ref UserPoolClient

Resources:
  # -------------------------------------------------------------------------
  # Auth Resources (Cognito + Google)
  # -------------------------------------------------------------------------
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-user-pool"
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: role
          AttributeDataType: String
          Mutable: true
          Required: false
        - Name: restaurant_id
          AttributeDataType: String
          Mutable: true
          Required: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${AWS::StackName}-client"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      SupportedIdentityProviders:
        - COGNITO
      AllowedOAuthFlows:
        - code
        - implicit
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
      CallbackURLs:
        - "http://localhost:3000/callback" 
        - "http://localhost:5173/"
        - "http://localhost:5174/"
        - !Sub "https://${CustomerWebDistribution.DomainName}/"
        - !Sub "https://${AdminPortalDistribution.DomainName}/"
      LogoutURLs:
        - "http://localhost:3000/logout"
        - "http://localhost:5173/"
        - "http://localhost:5174/"
        - !Sub "https://${CustomerWebDistribution.DomainName}/"
        - !Sub "https://${AdminPortalDistribution.DomainName}/"

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "${AWS::StackName}-auth-${AWS::AccountId}"
      UserPoolId: !Ref UserPool

  PostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: post_confirmation.lambda_handler
      Runtime: python3.11
      Architectures:
        - arm64
      Environment:
        Variables:
          USERS_TABLE: !GetAtt UsersService.Outputs.UsersTableName
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminUpdateUserAttributes
              Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*"
        - DynamoDBCrudPolicy:
            TableName: !GetAtt UsersService.Outputs.UsersTableName

  PostConfirmationInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PostConfirmationFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  # -------------------------------------------------------------------------
  # Nested Stacks (Microservices)
  # -------------------------------------------------------------------------

  UsersService:
    Type: AWS::Serverless::Application
    Properties:
      Location: ../services/users/template.yaml
      Parameters:
        UserPoolId: !Ref UserPool
        UserPoolClientId: !Ref UserPoolClient

        UserAvatarsBucketName: !Sub "${AWS::StackName}-user-avatars-${AWS::AccountId}"
        CorsAllowOrigin: !Sub "https://${CustomerWebDistribution.DomainName}"
        CorsAllowOriginAdmin: !Sub "https://${AdminPortalDistribution.DomainName}"

  RestaurantsService:
    Type: AWS::Serverless::Application
    Properties:
      Location: ../services/restaurants/template.yaml
      Parameters:
        UserPoolId: !Ref UserPool
        UserPoolClientId: !Ref UserPoolClient
        CorsAllowOrigin: !Sub "https://${CustomerWebDistribution.DomainName}"
        CorsAllowOriginAdmin: !Sub "https://${AdminPortalDistribution.DomainName}"

  OrdersService:
    Type: AWS::Serverless::Application
    Properties:
      Location: ../services/orders/template.yaml
      Parameters:
        UserPoolId: !Ref UserPool
        UserPoolClientId: !Ref UserPoolClient
        RestaurantConfigTableName: !GetAtt RestaurantsService.Outputs.RestaurantConfigTableName
        CorsAllowOrigin: !Sub "https://${CustomerWebDistribution.DomainName}"
        CorsAllowOriginAdmin: !Sub "https://${AdminPortalDistribution.DomainName}"

  # -------------------------------------------------------------------------
  # Frontend Hosting (S3)
  # -------------------------------------------------------------------------
  CustomerWebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-customer-web-${AWS::AccountId}"
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CustomerWebCloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub "OAI for ${AWS::StackName}-customer-web"

  CustomerWebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CustomerWebBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudFrontReadAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::cloudfront:user/CloudFront Origin Access Identity ${CustomerWebCloudFrontOAI}"
            Action: "s3:GetObject"
            Resource: !Sub "${CustomerWebBucket.Arn}/*"

  AdminPortalBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-admin-portal-${AWS::AccountId}"
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AdminPortalCloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub "OAI for ${AWS::StackName}-admin-portal"

  AdminPortalBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AdminPortalBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudFrontReadAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::cloudfront:user/CloudFront Origin Access Identity ${AdminPortalCloudFrontOAI}"
            Action: "s3:GetObject"
            Resource: !Sub "${AdminPortalBucket.Arn}/*"

  CustomerWebDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: CustomerWebOrigin
            DomainName: !GetAtt CustomerWebBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${CustomerWebCloudFrontOAI}"
        DefaultCacheBehavior:
          TargetOriginId: CustomerWebOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none

  AdminPortalDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: AdminPortalOrigin
            DomainName: !GetAtt AdminPortalBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${AdminPortalCloudFrontOAI}"
        DefaultCacheBehavior:
          TargetOriginId: AdminPortalOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none

Outputs:
  AuthUrl:
    Description: "Cognito Hosted UI"
    Value: !Sub "https://${UserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/login?client_id=${UserPoolClient}&response_type=code&scope=email+openid+profile&redirect_uri=https://${CustomerWebDistribution.DomainName}/"

  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref UserPool

  UserPoolClientId:
    Description: "Cognito User Pool Client ID"
    Value: !Ref UserPoolClient

  CustomerWebBucketName:
    Description: "S3 Bucket for Customer Web"
    Value: !Ref CustomerWebBucket

  AdminPortalBucketName:
    Description: "S3 Bucket for Admin Portal"
    Value: !Ref AdminPortalBucket

  CustomerWebURL:
    Description: "CloudFront URL for Customer Web"
    Value: !Sub "https://${CustomerWebDistribution.DomainName}"

  AdminPortalURL:
    Description: "CloudFront URL for Admin Portal"
    Value: !Sub "https://${AdminPortalDistribution.DomainName}"

  UsersApiUrl:
    Description: "API Endpoint for Users Service"
    Value: !GetAtt UsersService.Outputs.UsersApi

  RestaurantsApiUrl:
    Description: "API Endpoint for Restaurants Service"
    Value: !GetAtt RestaurantsService.Outputs.RestaurantsApi

  OrdersApiUrl:
    Description: "API Endpoint for Orders Service"
    Value: !GetAtt OrdersService.Outputs.OrdersApi
