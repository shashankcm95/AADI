AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  arrive-api

  Sample SAM Template for arrive-api

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 3

    Tracing: Active
    # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
    LoggingConfig:
      LogFormat: JSON
  Api:
    TracingEnabled: true
Resources:
  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Runtime: python3.11
      Events:
        HealthApi:
          Type: HttpApi
          Properties:
            Path: /v1/health
            Method: GET

  RestaurantsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: restaurant_id
          AttributeType: S
      KeySchema:
        - AttributeName: restaurant_id
          KeyType: HASH

  RestaurantConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: restaurant_id
          AttributeType: S
      KeySchema:
        - AttributeName: restaurant_id
          KeyType: HASH

  MenusTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: restaurant_id
          AttributeType: S
        - AttributeName: menu_version
          AttributeType: S
      KeySchema:
        - AttributeName: restaurant_id
          KeyType: HASH
        - AttributeName: menu_version
          KeyType: RANGE

  CapacityTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: restaurant_id
          AttributeType: S
        - AttributeName: window_start
          AttributeType: N
      KeySchema:
        - AttributeName: restaurant_id
          KeyType: HASH
        - AttributeName: window_start
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
    
  RestaurantsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src_restaurants/
      Handler: app.lambda_handler
      Runtime: python3.11
      Environment:
        Variables:
          RESTAURANTS_TABLE: !Ref RestaurantsTable
          MENUS_TABLE: !Ref MenusTable
          RESTAURANT_CONFIG_TABLE: !Ref RestaurantConfigTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RestaurantsTable
        - DynamoDBReadPolicy:
            TableName: !Ref MenusTable
        - DynamoDBReadPolicy:
            TableName: !Ref RestaurantConfigTable
      Events:
        ListRestaurants:
          Type: HttpApi
          Properties:
            Path: /v1/restaurants
            Method: GET
        GetMenu:
          Type: HttpApi
          Properties:
            Path: /v1/restaurants/{restaurant_id}/menu
            Method: GET

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: order_id
          AttributeType: S
        - AttributeName: restaurant_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: order_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: GSI_RestaurantStatus
          KeySchema:
            - AttributeName: restaurant_id
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  OrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src_orders/
      Handler: app.lambda_handler
      Runtime: python3.11
      Environment:
        Variables:
          ORDERS_TABLE: !Ref OrdersTable
          RESTAURANT_CONFIG_TABLE: !Ref RestaurantConfigTable
          CAPACITY_TABLE: !Ref CapacityTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBReadPolicy:
            TableName: !Ref RestaurantConfigTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CapacityTable

      Events:
        CreateOrder:
          Type: HttpApi
          Properties:
            Path: /v1/orders
            Method: POST
        UpdateVicinity:
          Type: HttpApi
          Properties:
            Path: /v1/orders/{order_id}/vicinity
            Method: POST
        ListRestaurantOrders:
          Type: HttpApi
          Properties:
            Path: /v1/restaurants/{restaurant_id}/orders
            Method: GET

  ApplicationResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name:
        Fn::Sub: ApplicationInsights-SAM-${AWS::StackName}
      ResourceQuery:
        Type: CLOUDFORMATION_STACK_1_0
  ApplicationInsightsMonitoring:
    Type: AWS::ApplicationInsights::Application
    Properties:
      ResourceGroupName:
        Ref: ApplicationResourceGroup
      AutoConfigurationEnabled: 'true'
Outputs:
  ApiUrl:
    Description: "HTTP API endpoint URL"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  HealthFunctionArn:
    Description: "Health Lambda ARN"
    Value: !GetAtt HealthFunction.Arn

  RestaurantsTableName:
    Description: "DynamoDB table for restaurants"
    Value: !Ref RestaurantsTable

  RestaurantConfigTableName:
    Description: "DynamoDB table for restaurant config"
    Value: !Ref RestaurantConfigTable

  MenusTableName:
    Description: "DynamoDB table for menus"
    Value: !Ref MenusTable
  
  OrdersTableName:
    Description: "DynamoDB table for orders"
    Value: !Ref OrdersTable

  CapacityTableName:
    Description: "DynamoDB table for capacity windows"
    Value: !Ref CapacityTable




