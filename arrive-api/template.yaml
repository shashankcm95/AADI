AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  arrive-api

  Sample SAM Template for arrive-api

Parameters:
  GoogleClientId:
    Type: String
    Description: Google OAuth 2.0 Client ID
    Default: "PLACEHOLDER_CLIENT_ID"
  GoogleClientSecret:
    Type: String
    Description: Google OAuth 2.0 Client Secret
    Default: "PLACEHOLDER_CLIENT_SECRET"
    NoEcho: true

Globals:
  Function:
    Timeout: 3

    Tracing: Active
    LoggingConfig:
      LogFormat: JSON
      ApplicationLogLevel: INFO
      SystemLogLevel: INFO
  Api:
    TracingEnabled: true
    # Security for Stage
    Auth:
      DefaultAuthorizer: CognitoJWT
      Authorizers:
        CognitoJWT:
          IdentitySource: "$request.header.Authorization"
          JwtConfiguration:
            issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
            audience:
              - !Ref UserPoolClient

Resources:
  # -------------------------------------------------------------------------
  # Auth Resources (Cognito + Google)
  # -------------------------------------------------------------------------
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-user-pool"
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: GoogleProvider
    Properties:
      ClientName: !Sub "${AWS::StackName}-client"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      SupportedIdentityProviders:
        - COGNITO
        - Google
      AllowedOAuthFlows:
        - code
        - implicit
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - "http://localhost:3000/callback" 
        # Break circular dependency (User must add API URL manually after deploy)
        - "https://example.com/callback"
      LogoutURLs:
        - "http://localhost:3000/logout"

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "${AWS::StackName}-auth-${AWS::AccountId}"
      UserPoolId: !Ref UserPool

  GoogleProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      ProviderName: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: "email profile openid"
      ProviderType: Google
      UserPoolId: !Ref UserPool
      AttributeMapping:
        email: "email"
        given_name: "given_name"
        family_name: "family_name"

  # -------------------------------------------------------------------------
  # API Definition (Explicit)
  # -------------------------------------------------------------------------
  MyApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        DefaultAuthorizer: CognitoJWT
        Authorizers:
          CognitoJWT:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient

  # -------------------------------------------------------------------------
  # API & Functions
  # -------------------------------------------------------------------------

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Runtime: python3.11
      Events:
        HealthApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref MyApi
            Path: /v1/health
            Method: GET
            Auth:
              Authorizer: NONE

  RestaurantsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: restaurant_id
          AttributeType: S
      KeySchema:
        - AttributeName: restaurant_id
          KeyType: HASH

  RestaurantConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: restaurant_id
          AttributeType: S
      KeySchema:
        - AttributeName: restaurant_id
          KeyType: HASH

  MenusTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: restaurant_id
          AttributeType: S
        - AttributeName: menu_version
          AttributeType: S
      KeySchema:
        - AttributeName: restaurant_id
          KeyType: HASH
        - AttributeName: menu_version
          KeyType: RANGE

  CapacityTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: restaurant_id
          AttributeType: S
        - AttributeName: window_start
          AttributeType: N
      KeySchema:
        - AttributeName: restaurant_id
          KeyType: HASH
        - AttributeName: window_start
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  IdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: idempotency_key
          AttributeType: S
      KeySchema:
        - AttributeName: idempotency_key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  RestaurantsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src_restaurants/
      Handler: app.lambda_handler
      Runtime: python3.11
      Environment:
        Variables:
          RESTAURANTS_TABLE: !Ref RestaurantsTable
          MENUS_TABLE: !Ref MenusTable
          RESTAURANT_CONFIG_TABLE: !Ref RestaurantConfigTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref RestaurantsTable
        - DynamoDBReadPolicy:
            TableName: !Ref MenusTable
        - DynamoDBReadPolicy:
            TableName: !Ref RestaurantConfigTable
      Events:
        ListRestaurants:
          Type: HttpApi
          Properties:
            ApiId: !Ref MyApi
            Path: /v1/restaurants
            Method: GET
        GetMenu:
          Type: HttpApi
          Properties:
            ApiId: !Ref MyApi
            Path: /v1/restaurants/{restaurant_id}/menu
            Method: GET

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: order_id
          AttributeType: S
        - AttributeName: restaurant_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: order_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: GSI_RestaurantStatus
          KeySchema:
            - AttributeName: restaurant_id
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
  
  OrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src_orders/
      Handler: app.lambda_handler
      Runtime: python3.11
      Environment:
        Variables:
          ORDERS_TABLE: !Ref OrdersTable
          RESTAURANT_CONFIG_TABLE: !Ref RestaurantConfigTable
          CAPACITY_TABLE: !Ref CapacityTable
          IDEMPOTENCY_TABLE: !Ref IdempotencyTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBReadPolicy:
            TableName: !Ref RestaurantConfigTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CapacityTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable

      Events:
        CreateOrder:
          Type: HttpApi
          Properties:
            ApiId: !Ref MyApi
            Path: /v1/orders
            Method: POST
        UpdateVicinity:
          Type: HttpApi
          Properties:
            ApiId: !Ref MyApi
            Path: /v1/orders/{order_id}/vicinity
            Method: POST
        ListRestaurantOrders:
          Type: HttpApi
          Properties:
            ApiId: !Ref MyApi
            Path: /v1/restaurants/{restaurant_id}/orders
            Method: GET
        RestaurantAck:
          Type: HttpApi
          Properties:
            ApiId: !Ref MyApi
            Path: /v1/restaurants/{restaurant_id}/orders/{order_id}/ack
            Method: POST
        GetOrder:
          Type: HttpApi
          Properties:
            ApiId: !Ref MyApi
            Path: /v1/orders/{order_id}
            Method: GET
        CancelOrder:
          Type: HttpApi
          Properties:
            ApiId: !Ref MyApi
            Path: /v1/orders/{order_id}/cancel
            Method: POST
        RestaurantSetStatus:
          Type: HttpApi
          Properties:
            ApiId: !Ref MyApi
            Path: /v1/restaurants/{restaurant_id}/orders/{order_id}/status
            Method: POST


  ApplicationResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name:
        Fn::Sub: ApplicationInsights-SAM-${AWS::StackName}
      ResourceQuery:
        Type: CLOUDFORMATION_STACK_1_0
  ApplicationInsightsMonitoring:
    Type: AWS::ApplicationInsights::Application
    Properties:
      ResourceGroupName:
        Ref: ApplicationResourceGroup
      AutoConfigurationEnabled: 'true'
Outputs:
  ApiUrl:
    Description: "HTTP API endpoint URL"
    Value: !Sub "https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com"
  
  AuthUrl:
    Description: "Cognito Hosted UI"
    Value: !Sub "https://${UserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/login?client_id=${UserPoolClient}&response_type=code&scope=email+openid+profile&redirect_uri=https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/callback"

  HealthFunctionArn:
    Description: "Health Lambda ARN"
    Value: !GetAtt HealthFunction.Arn

  RestaurantsTableName:
    Description: "DynamoDB table for restaurants"
    Value: !Ref RestaurantsTable

  RestaurantConfigTableName:
    Description: "DynamoDB table for restaurant config"
    Value: !Ref RestaurantConfigTable

  MenusTableName:
    Description: "DynamoDB table for menus"
    Value: !Ref MenusTable
  
  OrdersTableName:
    Description: "DynamoDB table for orders"
    Value: !Ref OrdersTable

  CapacityTableName:
    Description: "DynamoDB table for capacity windows"
    Value: !Ref CapacityTable

  IdempotencyTableName:
    Description: "DynamoDB table for idempotency keys"
    Value: !Ref IdempotencyTable

  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref UserPool

  UserPoolClientId:
    Description: "Cognito App Client ID"
    Value: !Ref UserPoolClient
